name: Generate Repo List Periodically

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update-list:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Fetch and filter repositories
              run: |
                  mkdir -p data/
                  page=1
                    
                  while :; do
                    # 1. Fetch 100 candidates per page (using CI token to avoid rate limits)
                    response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
                      "https://api.github.com/orgs/Railway-Op-Sim/repos?per_page=100&page=${page}")
                    
                    # 2. Get the number of items returned in this page
                    len=$(echo "$response" | jq '. | length' 2>/dev/null || echo 0)
                    
                    # If we get 0 items, we've reached the end
                    if [ "$len" -eq 0 ]; then
                      break
                    fi
                    
                    # 3. Merge this page into the master JSON array
                    echo $response | jq -r '.[].name' | grep -oE '^\w{2}-.*' >> temp.dat
                    
                    # If we got less than 100, this is the last page anyway; we can exit early
                    if [ "$len" -lt 100 ]; then
                      break
                    fi
                    
                    page=$((page + 1))
                  done
                    
                  # Save the complete list of candidates
                  cat temp.dat | sort -n > /tmp/github_registry.dat

            - name: Commit data to a separate branch
              run: |
                git fetch origin
                git checkout registry-data || git checkout -b registry-data
                git reset --hard origin/registry-data
                
                # 3. Create the data directory if it doesn't exist on this branch
                mkdir -p data
                
                # 4. Move the file from the temp directory into the repo
                mv /tmp/github_registry.dat data/github_registry.dat
                
                # 5. Stage, commit, and push
                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                
                git add data/github_registry.dat
                
                # Only commit and push if the file actually changed to avoid empty commit loops
                if ! git diff --cached --quiet; then
                  git commit -m "chore: auto-update github registry data [skip ci]"
                  git push origin registry-data
                else
                  echo "No changes detected in registry data."
                fi
